<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chenura Birthday 🎉</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    text-align: center;
    color: white;
    background: radial-gradient(circle, #000428, #004e92);
}

/* Sri Lanka flag */
.flag {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/1/11/Flag_of_Sri_Lanka.svg');
    background-size: cover;
    opacity: 0.08;
    z-index: -2;
}

/* Card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.65);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px gold;
    width: 340px;
}

/* Glow text */
h1 {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px gold; }
}

/* Countdown */
#countdown {
    margin-top: 10px;
    font-size: 18px;
}

/* Instagram embed responsive fix */
.instagram-media {
    margin: 10px auto !important;
    max-width: 100% !important;
}

/* Canvas fireworks */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<div class="flag"></div>

<canvas id="fireworks"></canvas>

<div class="card">
    <h1>🎉 Happy Birthday Chenura 🎉</h1>
    <p>@chenurag</p>

    <!-- 🔥 INSTAGRAM POST EMBED -->
    <blockquote class="instagram-media"
        data-instgrm-permalink="https://www.instagram.com/p/DXhVxJIiRfu/"
        data-instgrm-version="14"
        style="background:#000; border:0; margin: 10px auto; max-width:320px;">
    </blockquote>

    <div id="countdown"></div>
</div>

<script async src="//www.instagram.com/embed.js"></script>

<script>
// ================= COUNTDOWN =================
function updateCountdown(){
    let now = new Date();
    let year = now.getFullYear();
    let bday = new Date(year, 6, 4);

    if(now > bday) bday = new Date(year+1, 6, 4);

    let diff = bday - now;

    let d = Math.floor(diff/86400000);
    let h = Math.floor(diff%86400000/3600000);
    let m = Math.floor(diff%3600000/60000);
    let s = Math.floor(diff%60000/1000);

    document.getElementById("countdown").innerHTML =
        `⏳ ${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();


// ================= FIREWORKS =================
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

function Particle(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-0.5)*8;
    this.vy=(Math.random()-0.5)*8;
    this.life=100;
    this.color=`hsl(${Math.random()*360},100%,50%)`;
}

function boom(){
    let x = Math.random()*canvas.width;
    let y = Math.random()*canvas.height/2;

    for(let i=0;i<40;i++){
        particles.push(new Particle(x,y));
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}

setInterval(boom,1200);
animate();
</script>

</body>
</html>
