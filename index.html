<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Birthday Celebration 🎉</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: radial-gradient(circle, #001f3f, #000);
}

/* Sri Lanka flag overlay */
.flag {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/1/11/Flag_of_Sri_Lanka.svg');
    background-size: cover;
    opacity: 0.07;
    z-index: -2;
}

/* Main card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 30px gold;
    backdrop-filter: blur(10px);
}

/* Title */
h1 {
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px gold; }
}

/* Countdown */
#countdown {
    font-size: 1.8em;
    margin-top: 10px;
}

/* Button */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: gold;
    font-weight: bold;
}

/* Canvas fireworks */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<div class="flag"></div>

<canvas id="fireworks"></canvas>

<div class="card">
    <h1>🎉 Happy Birthday Chenura 🎉</h1>
    <p>Chenura Sanjana Gajanayake</p>

    <div id="countdown"></div>

    <button onclick="toggleMusic()">🎵 Toggle Music</button>
</div>

<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a5c2b6.mp3?filename=happy-birthday-110397.mp3">
</audio>

<script>
// ================= COUNTDOWN =================
function updateCountdown() {
    let now = new Date();
    let year = now.getFullYear();
    let bday = new Date(year, 6, 4);

    if (now > bday) bday = new Date(year + 1, 6, 4);

    let diff = bday - now;

    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor((diff / (1000*60*60)) % 24);
    let m = Math.floor((diff / (1000*60)) % 60);
    let s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        `⏳ ${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown, 1000);
updateCountdown();

// ================= MUSIC =================
let music = document.getElementById("music");
let playing = false;

function toggleMusic(){
    if(playing){
        music.pause();
    } else {
        music.play();
    }
    playing = !playing;
}

// ================= FIREWORKS =================
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function Particle(x,y,color){
    this.x=x;
    this.y=y;
    this.color=color;
    this.speedX=(Math.random()-0.5)*8;
    this.speedY=(Math.random()-0.5)*8;
    this.life=100;
}

function createFirework(){
    let x = Math.random()*canvas.width;
    let y = Math.random()*canvas.height/2;

    for(let i=0;i<40;i++){
        particles.push(new Particle(x,y,`hsl(${Math.random()*360},100%,50%)`));
    }
}

// ================= ANIMATION LOOP =================
function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0){
            particles.splice(i,1);
        }
    });

    requestAnimationFrame(animate);
}

setInterval(createFirework, 1200);
animate();
</script>

</body>
</html>
